<script>
const API = 'https://triagem-api.onrender.com';
let medico = null;
let plantaoAtivo = false;
let atendimentoAtual = null;
let timerInterval = null;
let timerSegundos = 0;
let filaInterval = null;
let filaData = [];
let chatInterval = null;
let ultimaMsgId = 0;
let chatAtivo = false;

// ── LOGIN ──
async function fazerLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const senha = document.getElementById('inp-senha').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('btn-login');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const res = await fetch(`${API}/api/medico/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      err.textContent = data.error || 'E-mail ou senha incorretos.';
      err.style.display = 'block'; return;
    }
    medico = data.medico;
    sessionStorage.setItem('medico', JSON.stringify(medico));
    sessionStorage.setItem('token', data.token || '');
    const adminPwd = document.getElementById('inp-admin-pwd').value;
    if (adminPwd) sessionStorage.setItem('adminPwd', adminPwd);
    entrarApp();
  } catch(e) {
    err.textContent = 'Erro ao conectar com o servidor.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar no painel';
  }
}

document.getElementById('inp-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

function getToken() { return sessionStorage.getItem('token') || ''; }

let agendInterval = null;

function toggleAdminField() {
  const f = document.getElementById('field-admin-pwd');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function entrarApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('nav-nome').textContent = medico.nome;
  renderEstado();
  buscarFila();
  buscarAgendamentos();
  clearInterval(agendInterval);
  agendInterval = setInterval(buscarAgendamentos, 60000);
  if (sessionStorage.getItem('adminPwd')) carregarMedicosPendentes();
  mostrarToast('Bem-vindo, ' + medico.nome.split(' ')[0] + '!', 'success');
}

function logout() {
  if (plantaoAtivo) sairPlantao();
  clearInterval(agendInterval); agendInterval = null;
  sessionStorage.clear(); medico = null;
  document.getElementById('screen-app').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('inp-email').value = '';
  document.getElementById('inp-senha').value = '';
  document.getElementById('inp-admin-pwd').value = '';
  document.getElementById('field-admin-pwd').style.display = 'none';
  adminData = []; adminVisible = false;
  document.getElementById('admin-tab-btn').style.display = 'none';
  document.getElementById('admin-medicos-lista').style.display = 'none';
}

// ── PLANTÃO ──
function togglePlantao() { if (plantaoAtivo) sairPlantao(); else entrarPlantao(); }

async function entrarPlantao() {
  try { await fetch(`${API}/api/plantao/entrar`, { method: 'POST', headers: { 'Authorization': `Bearer ${getToken()}` } }); } catch(e) {}
  plantaoAtivo = true;
  document.getElementById('btn-plantao').className = 'plantao-btn online';
  document.getElementById('plantao-txt').textContent = 'Sair do plantão';
  renderEstado(); iniciarPollingFila();
  mostrarToast('Você entrou em plantão', 'success');
}

async function sairPlantao() {
  try { await fetch(`${API}/api/plantao/sair`, { method: 'POST', headers: { 'Authorization': `Bearer ${getToken()}` } }); } catch(e) {}
  plantaoAtivo = false;
  document.getElementById('btn-plantao').className = 'plantao-btn offline';
  document.getElementById('plantao-txt').textContent = 'Entrar em plantão';
  pararPollingFila();
  if (!atendimentoAtual) renderEstado();
  mostrarToast('Você saiu do plantão', 'info');
}

// ── FILA ──
function iniciarPollingFila() { buscarFila(); filaInterval = setInterval(buscarFila, 15000); }
function pararPollingFila() { clearInterval(filaInterval); renderFila(); }

async function buscarFila() {
  try {
    const res = await fetch(`${API}/api/fila`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
    const data = await res.json();
    if (data.ok) { filaData = data.fila || []; renderFila(); renderEstado(); }
  } catch(e) {}
}

function renderFila() {
  const lista = document.getElementById('fila-lista');
  const count = document.getElementById('fila-count');
  count.textContent = filaData.filter(p => p.status === 'aguardando').length;
  if (!plantaoAtivo && !atendimentoAtual) {
    lista.innerHTML = '<div class="fila-vazia"><p>Entre em plantão para ver a fila</p></div>'; return;
  }
  if (filaData.length === 0) {
    lista.innerHTML = '<div class="fila-vazia"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Fila vazia</p></div>'; return;
  }
  try {
    lista.innerHTML = filaData.map(p => {
      const nome = p.nome || 'Paciente';
      const tipo = p.tipo || 'chat';
      const criado = p.criado_em || new Date().toISOString();
      const triagem = p.triagem || '—';
      const mins = Math.floor((Date.now() - new Date(criado)) / 60000);
      const tempoClass = mins >= 10 ? 'critico' : mins >= 5 ? 'urgente' : '';
      const isAtual = atendimentoAtual && String(atendimentoAtual.id) === String(p.id);
      const assumido = p.status === 'assumido' && !isAtual;
      const tipoLabel = tipo === 'video' ? '📹 Vídeo' : '💬 Chat';
      return `<div class="paciente-card ${isAtual?'active':''} ${assumido?'assumido':''}">
        <div class="pc-header">
          <div class="pc-nome">${String(nome).split(' ').slice(0,2).join(' ')}</div>
          <span class="pc-tipo ${tipo}">${tipoLabel}</span>
        </div>
        <div class="pc-queixa">${triagem}</div>
        <div class="pc-footer">
          <div class="pc-tempo ${tempoClass}">${mins}min</div>
          ${p.status==='aguardando'
            ? `<button class="btn-assumir" onclick="assumirAtendimento('${p.id}',event)">Assumir</button>`
            : `<span class="pc-status-badge">Em atendimento</span>`}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    lista.innerHTML = '<div class="fila-vazia"><p>Erro ao carregar fila</p></div>';
  }
}

// ── ASSUMIR ──
async function assumirAtendimento(id, evt) {
  evt.stopPropagation();
  if (!medico || !medico.id || !medico.nome) {
    mostrarToast('Faça login novamente.', 'error'); return;
  }
  try {
    const res = await fetch(`${API}/api/atendimento/assumir`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
      body: JSON.stringify({ filaId: Number(id), medicoId: Number(medico.id), medicoNome: medico.nome })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      mostrarToast(data.error || 'Este paciente já foi assumido.', 'error');
      await buscarFila(); return;
    }
    atendimentoAtual = data.atendimento || filaData.find(p => String(p.id) === String(id));
    timerSegundos = 0; iniciarTimer();
    await buscarFila();
    renderPainelAtendimento(); renderEstado();
    mostrarToast('Atendimento assumido!', 'success');
  } catch(e) {
    mostrarToast('Erro ao assumir atendimento.', 'error');
  }
}

function renderPainelAtendimento() {
  const p = atendimentoAtual;
  if (!p) return;
  const nome = p.nome || '—';
  const tel = p.tel || '';
  const tipo = p.tipo || 'chat';

  document.getElementById('atend-nome').textContent = nome;
  const tipoTag = document.getElementById('atend-tipo-tag');
  tipoTag.textContent = tipo === 'video' ? '📹 Consulta por vídeo' : '💬 Consulta por chat';
  tipoTag.className = 'atend-tag ' + tipo;
  document.getElementById('atend-crm-tag').textContent = 'CRM ' + (medico.crm || '—');
  document.getElementById('btn-wpp').href = 'https://wa.me/55' + String(tel).replace(/\D/g,'');
  document.getElementById('btn-wpp-consulta').href = 'https://wa.me/55' + String(tel).replace(/\D/g,'');

  document.getElementById('tr-nome-pac').textContent = nome;
  document.getElementById('tr-cpf-pac').textContent = p.cpf || '—';
  document.getElementById('tr-tel-pac').textContent = p.tel || '—';
  document.getElementById('tr-teldoc-pac').textContent = p.tel_documentos || p.tel || '—';

  document.getElementById('tr-idade').textContent = p.idade || '—';
  document.getElementById('tr-sexo').textContent = p.sexo || '—';
  document.getElementById('tr-alergias').textContent = p.alergias || '—';
  document.getElementById('tr-cronicas').textContent = p.cronicas || '—';
  document.getElementById('tr-medicacoes').textContent = p.medicacoes || '—';
  document.getElementById('tr-solicita').textContent = p.solicita || '—';
  document.getElementById('tr-queixa').textContent = p.queixa || p.triagem || '—';

  if (p.alergias) document.getElementById('cl-alergias').value = p.alergias;
  if (p.cronicas) document.getElementById('cl-comorbidades').value = p.cronicas;
  if (p.medicacoes) document.getElementById('cl-medicacoes').value = p.medicacoes;
  if (p.queixa) document.getElementById('cl-hda').value = p.queixa;
  document.getElementById('cl-obs').value = '';
  document.getElementById('cl-conduta').value = '';
  document.querySelectorAll('.doc-check').forEach(d => d.classList.remove('checked'));
  document.getElementById('pront-output').style.display = 'none';
  document.getElementById('btn-copiar').style.display = 'none';

  document.getElementById('meet-section').style.display = 'none';
  document.getElementById('chat-section').style.display = 'none';
  document.getElementById('wpp-consulta-section').style.display = 'none';

  if (tipo === 'video') {
    document.getElementById('meet-section').style.display = 'block';
    if (p.meet_link) {
      document.getElementById('meetLinkInput').value = p.meet_link;
      document.getElementById('meetLinkAtualUrl').textContent = p.meet_link;
      document.getElementById('meetLinkAtualUrl').href = p.meet_link;
      document.getElementById('meetLinkAtual').style.display = 'block';
    }
  } else if (tipo === 'chat') {
    document.getElementById('chat-section').style.display = 'block';
    iniciarChatMedico();
  } else {
    document.getElementById('wpp-consulta-section').style.display = 'block';
  }

  switchTab('consulta');
}

// ── TABS ──
function switchTab(nome) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const nomes = ['consulta','clinico','prontuario'];
    t.classList.toggle('active', nomes[i] === nome);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+nome).classList.add('active');
}

// ── CHAT MÉDICO ──
function iniciarChatMedico() {
  ultimaMsgId = 0;
  chatAtivo = true;
  clearInterval(chatInterval);
  carregarHistoricoMedico().then(() => {
    chatInterval = setInterval(buscarMensagensNovasMedico, 3000);
  });
  const ta = document.getElementById('chat-medico-textarea');
  ta.addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; });
  ta.addEventListener('keydown', function(e) {
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); enviarMensagemMedico(); }
  });
}

async function carregarHistoricoMedico() {
  if (!atendimentoAtual) return;
  try {
    const res = await fetch(`${API}/api/chat/${atendimentoAtual.id}`);
    const data = await res.json();
    if (!data.ok) return;
    const container = document.getElementById('chat-medico-msgs');
    const msgs = data.mensagens || [];
    if (msgs.length > 0) {
      const vazio = container.querySelector('.chat-vazio');
      if (vazio) vazio.remove();
      msgs.forEach(m => {
        adicionarMsgMedico(m.autor, m.texto, m.criado_em);
        ultimaMsgId = m.id;
      });
    }
  } catch(e) {}
}

async function buscarMensagensNovasMedico() {
  if (!atendimentoAtual || !chatAtivo) return;
  try {
    const res = await fetch(`${API}/api/chat/${atendimentoAtual.id}`);
    const data = await res.json();
    if (!data.ok) return;
    const novas = (data.mensagens || []).filter(m => m.id > ultimaMsgId);
    if (novas.length > 0) {
      const container = document.getElementById('chat-medico-msgs');
      const vazio = container.querySelector('.chat-vazio');
      if (vazio) vazio.remove();
      novas.forEach(m => {
        if (m.autor === 'paciente') {
          adicionarMsgMedico(m.autor, m.texto, m.criado_em);
        }
        ultimaMsgId = m.id;
      });
    }
  } catch(e) {}
}

async function enviarMensagemMedico() {
  const ta = document.getElementById('chat-medico-textarea');
  const texto = ta.value.trim();
  if (!texto || !atendimentoAtual) return;
  ta.value = ''; ta.style.height = 'auto';
  adicionarMsgMedico('medico', texto, new Date().toISOString());
  try {
    await fetch(`${API}/api/chat/enviar`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ atendimentoId: atendimentoAtual.id, autor: 'medico', autorId: medico.id, texto })
    });
  } catch(e) {}
}

function adicionarMsgMedico(autor, texto, timestamp) {
  const container = document.getElementById('chat-medico-msgs');
  const div = document.createElement('div');
  div.className = 'cmsg ' + autor;
  const hora = new Date(timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const av = autor === 'medico' ? '🩺' : '🧑';
  const safe = String(texto).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  div.innerHTML = `<div class="av">${av}</div><div class="bub-wrap"><div class="bub">${safe}</div><div class="ts">${hora}</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── MEET LINK ──
async function salvarMeetLink() {
  const link = document.getElementById('meetLinkInput').value.trim();
  if (!link || !atendimentoAtual) return;
  if (!link.startsWith('https://meet.google.com/')) {
    mostrarToast('Cole um link válido do Google Meet', 'error'); return;
  }
  try {
    const res = await fetch(`${API}/api/atendimento/meet`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
      body: JSON.stringify({ filaId: atendimentoAtual.id, meetLink: link })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('meetLinkAtualUrl').textContent = link;
      document.getElementById('meetLinkAtualUrl').href = link;
      document.getElementById('meetLinkAtual').style.display = 'block';
      atendimentoAtual.meet_link = link;
      mostrarToast('Link do Meet salvo! O paciente já pode entrar.', 'success');
    }
  } catch(e) {
    mostrarToast('Erro ao salvar link.', 'error');
  }
}

// ── ESTADO ──
function renderEstado() {
  const offline = document.getElementById('state-offline');
  const empty = document.getElementById('state-empty');
  const atend = document.getElementById('state-atend');
  if (atendimentoAtual) {
    offline.style.display = 'none'; empty.style.display = 'none'; atend.style.display = 'block'; return;
  }
  atend.style.display = 'none';
  if (!plantaoAtivo) { offline.style.display = 'flex'; empty.style.display = 'none'; }
  else { offline.style.display = 'none'; empty.style.display = filaData.length === 0 ? 'flex' : 'none'; }
}

// ── TIMER ──
function iniciarTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSegundos++;
    const m = String(Math.floor(timerSegundos/60)).padStart(2,'0');
    const s = String(timerSegundos%60).padStart(2,'0');
    const el = document.getElementById('atend-timer');
    if (el) el.textContent = m + ':' + s;
  }, 1000);
}

function toggleDoc(el) { el.classList.toggle('checked'); }

// ── PRONTUÁRIO ──
function gerarProntuario() {
  const p = atendimentoAtual;
  if (!p) return;
  const nome = p.nome || '—';
  const tel = p.tel || '—';
  const telDoc = p.tel_documentos || p.tel || '—';
  const cpf = p.cpf || '—';
  const tipo = p.tipo || 'chat';
  const queixa = p.queixa || p.triagem || '—';
  const hda = document.getElementById('cl-hda').value.trim() || '(não preenchido)';
  const comorbidades = document.getElementById('cl-comorbidades').value.trim() || 'Nega comorbidades referidas';
  const medicacoes = document.getElementById('cl-medicacoes').value.trim() || 'Nega uso contínuo de medicações';
  const alergias = document.getElementById('cl-alergias').value.trim() || 'Nega alergias medicamentosas';
  const obs = document.getElementById('cl-obs').value.trim();
  const conduta = document.getElementById('cl-conduta').value.trim() || '(não preenchido)';
  const docs = [...document.querySelectorAll('.doc-check.checked')].map(d => d.querySelector('.dc-text').textContent).join(', ') || 'Nenhum';
  const modalidadeTexto = tipo === 'video' ? 'Consulta por vídeo' : 'Consulta por chat';
  const dataFormatada = new Date().toLocaleString('pt-BR', { timeZone: 'America/Fortaleza', day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  const sep = '────────────────────────────────────────';
  const linhas = [
    'PRONTUÁRIO DE TELEMEDICINA',
    'Consulta realizada por telemedicina conforme Resolução CFM 2.314/2022',
    sep, '',
    `Data/Hora: ${dataFormatada}`,
    `Paciente: ${nome}`,
    `CPF: ${cpf}`,
    `WhatsApp: ${tel}`,
    `Tel. documentos: ${telDoc}`,
    `Médico: ${medico.nome}`,
    `CRM: ${medico.crm}`,
    `Modalidade: ${modalidadeTexto}`,
    '', sep,
    'TRIAGEM', '',
    'Queixa inicial:',
    queixa,
    ...(p.idade ? [`Idade: ${p.idade}`] : []),
    ...(p.sexo ? [`Sexo: ${p.sexo}`] : []),
    ...(p.solicita ? [`Solicita: ${p.solicita}`] : []),
    '', sep,
    'AVALIAÇÃO CLÍNICA', '',
    'HDA (História da Doença Atual)',
    hda, '',
    'Antecedentes / Comorbidades',
    comorbidades, '',
    'Medicações em uso',
    medicacoes, '',
    'Alergias',
    alergias,
  ];
  if (obs) linhas.push('', 'Observações em telemedicina', obs);
  linhas.push(
    '', sep,
    'CONDUTA', '',
    conduta, '',
    `Documentos emitidos: ${docs}`,
    '', sep,
    `${medico.nome}`,
    `CRM ${medico.crm}`,
    '',
    'Documento gerado eletronicamente em plataforma de telemedicina.',
    'Registro de atendimento conforme Resolução CFM 2.314/2022.'
  );
  const out = document.getElementById('pront-output');
  out.textContent = linhas.join('\n');
  out.style.display = 'block';
  const btnCopiar = document.getElementById('btn-copiar');
  btnCopiar.style.display = 'inline-flex';
  btnCopiar.classList.remove('copied');
  btnCopiar.textContent = 'Copiar texto';
  mostrarToast('Prontuário gerado!', 'success');
}

function copiarProntuario() {
  navigator.clipboard.writeText(document.getElementById('pront-output').textContent).then(() => {
    const btn = document.getElementById('btn-copiar');
    btn.classList.add('copied'); btn.textContent = '✓ Copiado!';
    mostrarToast('Prontuário copiado!', 'success');
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copiar texto'; }, 3000);
  });
}

// ── MODAL ENCERRAR ──
function abrirModalEncerrar() {
  document.getElementById('modal-encerrar').classList.add('open');
  document.querySelectorAll('#rg-status .radio-opt').forEach(r => r.classList.remove('selected'));
  document.querySelectorAll('#cg-docs .check-opt').forEach(c => c.classList.remove('selected'));
}
function fecharModal() { document.getElementById('modal-encerrar').classList.remove('open'); }
function selectRadio(el) { el.closest('.radio-group').querySelectorAll('.radio-opt').forEach(r => r.classList.remove('selected')); el.classList.add('selected'); }
function toggleCheck(el) { el.classList.toggle('selected'); }

async function confirmarEncerramento() {
  const statusEl = document.querySelector('#rg-status .radio-opt.selected');
  if (!statusEl) { mostrarToast('Selecione o status do atendimento.', 'error'); return; }
  const statusTexto = statusEl.querySelector('.radio-text').textContent;
  const docs = [...document.querySelectorAll('#cg-docs .check-opt.selected')].map(el => el.textContent.trim()).join(', ') || 'Nenhum';
  clearInterval(chatInterval); chatAtivo = false;
  try {
    await fetch(`${API}/api/atendimento/encerrar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
      body: JSON.stringify({ filaId: atendimentoAtual.id, status: statusTexto, documentos_emitidos: docs })
    });
  } catch(e) {}
  clearInterval(timerInterval);
  filaData = filaData.filter(p => String(p.id) !== String(atendimentoAtual.id));
  atendimentoAtual = null;
  fecharModal();
  renderFila(); renderEstado();
  mostrarToast('Atendimento encerrado', 'success');
}

// ── AGENDAMENTOS ──
let agendData = [];
let agendVisible = false;

async function buscarAgendamentos() {
  try {
    const res = await fetch(`${API}/api/agendamentos`, {
      headers: { 'Authorization': `Bearer ${getToken()}` }
    });
    const data = await res.json();
    if (!data.ok) return;
    agendData = data.agendamentos || [];
    document.getElementById('agend-count').textContent = agendData.length;
    if (agendVisible) renderAgendamentos();
  } catch(e) {}
}

function toggleAgendamentos() {
  agendVisible = !agendVisible;
  document.getElementById('agend-lista').style.display = agendVisible ? 'block' : 'none';
  if (agendVisible) renderAgendamentos();
}

function renderAgendamentos() {
  const container = document.getElementById('agend-lista');
  if (!agendData.length) {
    container.innerHTML = '<div class="fila-vazia" style="padding:14px 12px"><p>Nenhum agendamento próximo</p></div>';
    return;
  }
  container.innerHTML = agendData.map(a => {
    const h = a.horario_agendado ? new Date(a.horario_agendado).toLocaleString('pt-BR', {
      timeZone: 'America/Fortaleza', weekday: 'short', day: '2-digit', month: '2-digit',
      hour: '2-digit', minute: '2-digit'
    }) : '—';
    const tipoIcon = a.modalidade === 'video' ? '🎥' : '💬';
    // ── CORREÇÃO: JSON.stringify evita quebra com nomes com aspas ou acentos especiais
    const nomeJson = JSON.stringify(a.nome || '');
    const telJson  = JSON.stringify(a.tel || '');
    const tipoJson = JSON.stringify(a.modalidade || 'chat');
    return `<div class="fila-card" style="cursor:default;border-color:rgba(66,133,244,.25)">
      <div class="fc-top">
        <span class="fc-nome">${a.nome || '—'}</span>
        <span class="fc-tempo" style="color:#4285f4">📅</span>
      </div>
      <div class="fc-meta">
        <span class="fc-tag" style="background:rgba(66,133,244,.12);color:#4285f4">${tipoIcon}</span>
        <span class="fc-tag" style="color:rgba(255,255,255,.4);font-size:.72rem">${h}</span>
      </div>
      <div style="font-size:.72rem;color:rgba(255,255,255,.35);margin-top:4px">📱 ${a.tel || '—'} · CPF: ${a.cpf || '—'}</div>
      <button class="btn-iniciar-agora" onclick="iniciarAgendamento(${a.id}, ${nomeJson}, ${telJson}, ${tipoJson})">▶ Iniciar consulta agora</button>
    </div>`;
  }).join('');
}

// ── ADMIN: MÉDICOS PENDENTES ──
let adminVisible = false;
let adminData = [];

async function carregarMedicosPendentes() {
  try {
    const res = await fetch(`${API}/api/admin/medicos/pendentes`, {
      headers: { 'x-admin-password': sessionStorage.getItem('adminPwd') || '' }
    });
    if (!res.ok) return;
    const data = await res.json();
    adminData = data.medicos || [];
    const count = adminData.length;
    const tabBtn = document.getElementById('admin-tab-btn');
    const countEl = document.getElementById('admin-pendente-count');
    if (count > 0) {
      tabBtn.style.display = 'flex';
      countEl.textContent = count;
    } else {
      tabBtn.style.display = 'none';
    }
    if (adminVisible) renderMedicosPendentes();
  } catch(e) {}
}

function toggleAdmin() {
  adminVisible = !adminVisible;
  const lista = document.getElementById('admin-medicos-lista');
  lista.style.display = adminVisible ? 'block' : 'none';
  if (adminVisible) renderMedicosPendentes();
}

function renderMedicosPendentes() {
  const container = document.getElementById('admin-medicos-lista');
  if (!adminData.length) {
    container.innerHTML = '<div class="fila-vazia" style="padding:12px"><p>Nenhum médico pendente</p></div>';
    return;
  }
  container.innerHTML = adminData.map(m => {
    const dt = m.created_at ? new Date(m.created_at).toLocaleString('pt-BR', { timeZone: 'America/Fortaleza', day:'2-digit', month:'2-digit', year:'numeric' }) : '—';
    return `<div class="medico-card">
      <div class="medico-card-nome">${m.nome || '—'}</div>
      <div class="medico-card-meta">
        CRM ${m.crm || '—'}/${m.uf || '—'}${m.especialidade ? ' · ' + m.especialidade : ''}<br>
        ${m.email || '—'} · 📱 ${m.telefone || '—'}<br>
        Cadastro: ${dt}
      </div>
      <div class="medico-card-btns">
        <button class="btn-aprovar" onclick="aprovarMedico(${m.id}, this)">✓ Aprovar</button>
        <button class="btn-rejeitar" onclick="rejeitarMedico(${m.id}, this)">✕ Rejeitar</button>
      </div>
    </div>`;
  }).join('');
}

async function aprovarMedico(id, btn) {
  const pwd = sessionStorage.getItem('adminPwd') || '';
  btn.disabled = true; btn.textContent = 'Aprovando...';
  try {
    const res = await fetch(`${API}/api/admin/medico/${id}/aprovar`, {
      method: 'PATCH', headers: { 'x-admin-password': pwd }
    });
    const d = await res.json();
    if (d.ok) {
      adminData = adminData.filter(m => m.id !== id);
      renderMedicosPendentes();
      document.getElementById('admin-pendente-count').textContent = adminData.length;
      if (!adminData.length) document.getElementById('admin-tab-btn').style.display = 'none';
      mostrarToast('Médico aprovado com sucesso', 'success');
    } else { mostrarToast(d.error || 'Erro ao aprovar', 'error'); btn.disabled = false; btn.textContent = '✓ Aprovar'; }
  } catch(e) { mostrarToast('Erro de conexão', 'error'); btn.disabled = false; btn.textContent = '✓ Aprovar'; }
}

async function rejeitarMedico(id, btn) {
  if (!confirm('Rejeitar este médico?')) return;
  const pwd = sessionStorage.getItem('adminPwd') || '';
  btn.disabled = true; btn.textContent = 'Rejeitando...';
  try {
    const res = await fetch(`${API}/api/admin/medico/${id}/rejeitar`, {
      method: 'PATCH', headers: { 'x-admin-password': pwd }
    });
    const d = await res.json();
    if (d.ok) {
      adminData = adminData.filter(m => m.id !== id);
      renderMedicosPendentes();
      document.getElementById('admin-pendente-count').textContent = adminData.length;
      if (!adminData.length) document.getElementById('admin-tab-btn').style.display = 'none';
      mostrarToast('Médico rejeitado', 'info');
    } else { mostrarToast(d.error || 'Erro ao rejeitar', 'error'); btn.disabled = false; btn.textContent = '✕ Rejeitar'; }
  } catch(e) { mostrarToast('Erro de conexão', 'error'); btn.disabled = false; btn.textContent = '✕ Rejeitar'; }
}

// ── INICIAR AGENDAMENTO ANTECIPADO ──
// CORREÇÃO: recebe tipo como parâmetro (era hardcoded 'chat')
// CORREÇÃO: usa JSON.stringify no onclick para escapar nomes com aspas/acentos
async function iniciarAgendamento(agendId, nome, tel, tipo = 'chat') {
  if (!confirm(`Iniciar consulta de ${nome} agora (antes do horário)?`)) return;
  try {
    const res = await fetch(`${API}/api/agendamento/${agendId}/iniciar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }
    });
    const d = await res.json();
    if (!d.ok) { mostrarToast(d.error || 'Erro ao iniciar', 'error'); return; }

    await buscarFila();
    await buscarAgendamentos();

    // Procura o atendimento recém-criado na fila atualizada
    const atend = Array.isArray(filaData)
      ? filaData.find(p => String(p.id) === String(d.atendimentoId))
      : null;

    if (atend) {
      atendimentoAtual = atend;
    } else {
      // Fallback com dados do agendamento caso a fila ainda não tenha atualizado
      atendimentoAtual = {
        id: d.atendimentoId,
        nome,
        tel,
        tipo,
        triagem: '(Agendamento antecipado)',
        status: 'assumido'
      };
    }

    timerSegundos = 0; iniciarTimer();
    renderPainelAtendimento(); renderEstado();
    mostrarToast('Consulta iniciada!', 'success');
  } catch(e) { mostrarToast('Erro de conexão', 'error'); }
}

// ── TOAST ──
let toastTimer = null;
function mostrarToast(msg, tipo = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + tipo + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

(function init() {
  const saved = sessionStorage.getItem('medico');
  if (saved) { medico = JSON.parse(saved); entrarApp(); }
})();
